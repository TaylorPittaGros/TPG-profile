    <h1>We are one.</h1>
    <p>Collectively we succeed, divided we fail.</p>
    <h2>The journey continues.</h2>
    <p>
      So that I can prove to myself that I am capable — and hopefully inspire
      you to chase your own dreams too.
    </p>
    <h3>I know you can.</h3>
    <p>You can do it.</p>
    <p>The only limiting belief is our own self-imposed limits.</p>
